name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/app/
        run: npm run build

      - name: Nest build output under /app, add root redirect and SPA 404 fallback
        run: |
          mkdir -p pages-root/app
          cp -r dist/. pages-root/app/
          cp pages-root/app/index.html pages-root/404.html
          printf '%s\n' \
            '<!DOCTYPE html>' \
            '<meta http-equiv="refresh" content="0; url=./app/">' \
            '<a href="./app/">Continue to NexxByte CRM</a>' \
            > pages-root/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-root

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
